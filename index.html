<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Roupa | Minimalist Collection</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="logo">LOJA DE ROUPA</div>
    <nav>
        <span>Coleção 2026</span>
    </nav>
</header>

<div class="layout">
    <main class="vitrine" id="produtos-grid">
        </main>

    <aside class="sidebar-carrinho">
        <h3>Seu Carrinho</h3>
        <div id="itens-carrinho">
            <p class="empty-msg">O carrinho está vazio.</p>
        </div>
        <div class="footer-carrinho">
            <div class="total">
                <span>Total</span>
                <span id="valor-total">R$ 0,00</span>
            </div>
            <button class="btn-finalizar" onclick="abrirCheckout()">FINALIZAR COMPRA</button>
            <button class="btn-zap" onclick="finalizarZap()">COMPRAR VIA WHATSAPP</button>
        </div>
    </aside>
</div>

<div id="modal-pagamento" class="modal">
    <div class="modal-content">
        <h2>Pagamento Seguro</h2>
        <p>Escolha a forma de pagamento:</p>
        <button onclick="alert('Redirecionando para o PIX...')">PIX (5% OFF)</button>
        <button onclick="alert('Abrindo Checkout Cartão...')">Cartão de Crédito</button>
        <button class="btn-close" onclick="fecharCheckout()">Voltar</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
