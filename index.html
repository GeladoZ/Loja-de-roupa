<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de roupa | Checkout Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">LOJA DE ROUPA</div>
    <div class="cart-icon" onclick="toggleCarrinho()">
        🛒 <span id="cart-count">0</span> itens
    </div>
</header>

<main class="container" id="vitrine">
    </main>

<div id="sidebar-cart" class="sidebar">
    <div class="cart-header">
        <h2>Seu Carrinho</h2>
        <button class="close-btn" onclick="toggleCarrinho()">×</button>
    </div>
    <div id="cart-items"></div>
    <div class="cart-footer">
        <p>Total: <strong>R$ <span id="total-price">0,00</span></strong></p>
        <button class="btn-checkout" onclick="abrirCheckout()">FINALIZAR COMPRA</button>
    </div>
</div>

<div id="payment-modal" class="modal">
    <div class="modal-content">
        <h3>Finalizar Pedido</h3>
        <p>Escolha como deseja pagar:</p>
        
        <div class="payment-options">
            <button class="btn-pay pix" onclick="finalizar('Pix')">Pagar com PIX / Cartão</button>
            <button class="btn-pay zap" onclick="finalizar('WhatsApp')">Fechar via WhatsApp</button>
        </div>
        <button class="btn-cancel" onclick="fecharCheckout()">Cancelar</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
