<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de roupa | Coleção 2026</title>
    <style>
        /* Estilo Geral */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: #f9f9f9; color: #1a1a1a; line-height: 1.6; }
        
        /* Cabeçalho */
        header { background: #fff; border-bottom: 1px solid #eee; padding: 2rem; text-align: center; position: sticky; top: 0; z-index: 100; }
        header h1 { letter-spacing: 4px; text-transform: uppercase; font-size: 1.5rem; }
        
        /* Banner Principal */
        .hero { background: #000; color: #fff; padding: 80px 20px; text-align: center; margin-bottom: 40px; }
        .hero h2 { font-size: 2.5rem; margin-bottom: 10px; }
        
        /* Vitrine de Produtos */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        
        .card { background: #fff; border: 1px solid #eee; overflow: hidden; transition: 0.4s; }
        .card:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 400px; object-fit: cover; filter: grayscale(20%); transition: 0.5s; }
        .card:hover img { filter: grayscale(0%); }
        
        .card-info { padding: 20px; text-align: center; }
        .card-info h3 { font-size: 1.1rem; margin-bottom: 10px; text-transform: uppercase; }
        .price { color: #555; font-weight: bold; font-size: 1.2rem; margin-bottom: 15px; display: block; }
        
        /* Botão WhatsApp */
        .btn-buy { display: block; width: 100%; padding: 12px; background: #25d366; color: #fff; text-align: center; text-decoration: none; font-weight: bold; border-radius: 2px; transition: 0.3s; }
        .btn-buy:hover { background: #128c7e; }
        
        footer { text-align: center; padding: 60px; background: #fff; border-top: 1px solid #eee; margin-top: 50px; color: #999; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>LOJA DE ROUPA</h1>
</header>

<section class="hero">
    <h2>NEW SEASON</h2>
    <p>Peças exclusivas com curadoria premium.</p>
</section>

<main class="container">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=800" alt="Camiseta">
        <div class="card-info">
            <h3>Camiseta Minimalista Branca</h3>
            <span class="price">R$ 89,90</span>
            <a href="https://wa.me/5511999999999?text=Olá! Gostaria de comprar a Camiseta Minimalista" target="_blank" class="btn-buy">PEDIR NO WHATSAPP</a>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?auto=format&fit=crop&w=800" alt="Jaqueta">
        <div class="card-info">
            <h3>Jaqueta Bomber Navy</h3>
            <span class="price">R$ 249,90</span>
            <a href="https://wa.me/5511999999999?text=Olá! Gostaria de comprar a Jaqueta Bomber" target="_blank" class="btn-buy">PEDIR NO WHATSAPP</a>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1542272604-787c3835535d?auto=format&fit=crop&w=800" alt="Calça">
        <div class="card-info">
            <h3>Calça Jeans Slim Fit</h3>
            <span class="price">R$ 159,90</span>
            <a href="https://wa.me/5511999999999?text=Olá! Gostaria de comprar a Calça Jeans" target="_blank" class="btn-buy">PEDIR NO WHATSAPP</a>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 LOJA DE ROUPA. Todos os direitos reservados.</p>
</footer>

</body>
</html>
