<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Roupa | Minimalist</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<header class="navbar">
    <div class="logo">LOJA DE ROUPA</div>
    <div class="cart-trigger" onclick="toggleCart()">
        <span>Carrinho</span>
        <span id="cart-count" class="badge">0</span>
    </div>
</header>

<div class="main-layout">
    <section class="products-grid" id="grid-produtos"></section>

    <aside id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3>Seu Carrinho</h3>
            <button class="close-cart" onclick="toggleCart()">✕</button>
        </div>
        
        <div id="cart-items-container" class="cart-body">
            <p class="empty-text">Seu carrinho está vazio.</p>
        </div>

        <div class="cart-footer">
            <div class="total-row">
                <span>Total</span>
                <span id="total-value">R$ 0,00</span>
            </div>
            <button class="btn-checkout" onclick="checkoutZap()">FINALIZAR NO WHATSAPP</button>
            <button class="btn-pix" onclick="alert('Opção de PIX disponível no checkout do WhatsApp!')">PAGAR COM PIX</button>
        </div>
    </aside>
</div>

<script src="script.js"></script>
</body>
</html>
